name: Daily addon release

on:
  schedule:
    # GitHub cron is UTC. This runs after the public QWT daily cache should be warm.
    - cron: '30 15 * * *'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Run a fast validation without committing, tagging, or publishing a release.'
        required: true
        default: true
        type: boolean
      dry_run_limit:
        description: 'Number of specs to generate in dry-run mode.'
        required: false
        default: '1'
        type: string
      version:
        description: 'Optional explicit semver version for non-dry-run releases, e.g. 1.1.0. Defaults to next patch.'
        required: false
        type: string

permissions:
  contents: write

concurrency:
  group: daily-addon-release
  cancel-in-progress: false

jobs:
  release:
    name: Generate addon data and publish release
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - name: Check out repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Configure git author
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'

      - name: Generate bundled addon data
        env:
          QWT_ADDON_DATA_TIMEOUT_MS: '45000'
          QWT_ADDON_DELAY_MS: '100'
          QWT_ADDON_CONCURRENCY: '8'
          QWT_FETCH_TIMEOUT_MS: '30000'
          DRY_RUN: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.dry_run == 'true' }}
          DRY_RUN_LIMIT: ${{ github.event.inputs.dry_run_limit }}
        run: |
          if [ "$DRY_RUN" = "true" ]; then
            LIMIT="${DRY_RUN_LIMIT:-1}"
            echo "Running dry-run data generation for $LIMIT spec(s); no release will be published."
            npm run build:data:strict -- --limit "$LIMIT" --output /tmp/QuickWoWTalentsData.lua
          else
            npm run build:data:download
          fi

      - name: Decide whether to continue release
        id: release_gate
        env:
          DRY_RUN: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.dry_run == 'true' }}
          MANUAL_FULL_RELEASE: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.dry_run != 'true' }}
        run: |
          if [ "$DRY_RUN" = "true" ]; then
            echo "continue=true" >> "$GITHUB_OUTPUT"
            echo "reason=dry-run" >> "$GITHUB_OUTPUT"
            echo "Dry-run validation always continues through checks and packaging."
            exit 0
          fi

          if [ "$MANUAL_FULL_RELEASE" = "true" ]; then
            echo "continue=true" >> "$GITHUB_OUTPUT"
            echo "reason=manual-full-release" >> "$GITHUB_OUTPUT"
            echo "Manual full release requested; continuing even if bundled data is unchanged."
            exit 0
          fi

          if git diff --quiet -- QuickWoWTalents/QuickWoWTalentsData.lua; then
            echo "continue=false" >> "$GITHUB_OUTPUT"
            echo "reason=data-unchanged" >> "$GITHUB_OUTPUT"
            echo "Bundled addon data is unchanged; skipping version bump and release."
          else
            echo "continue=true" >> "$GITHUB_OUTPUT"
            echo "reason=data-changed" >> "$GITHUB_OUTPUT"
            echo "Bundled addon data changed; continuing release."
          fi

      - name: Prepare next addon version
        if: ${{ steps.release_gate.outputs.continue == 'true' && (github.event_name == 'schedule' || github.event.inputs.dry_run != 'true') }}
        env:
          RELEASE_VERSION: ${{ github.event.inputs.version }}
        run: |
          if [ -n "$RELEASE_VERSION" ]; then
            npm run release:prepare -- --version "$RELEASE_VERSION"
          else
            npm run release:prepare
          fi

      - name: Verify scripts and tests
        run: |
          node --check scripts/build-data.mjs
          node --check scripts/download-addon-data.mjs
          node --check scripts/package-addon.mjs
          node --check scripts/prepare-release.mjs
          npm test

      - name: Package addon zip
        if: ${{ steps.release_gate.outputs.continue == 'true' }}
        run: npm run package

      - name: Resolve release version
        if: ${{ steps.release_gate.outputs.continue == 'true' }}
        id: version
        run: |
          VERSION="$(node -p "JSON.parse(require('fs').readFileSync('package.json', 'utf8')).version")"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=v$VERSION" >> "$GITHUB_OUTPUT"
          echo "zip=dist/QuickWoWTalents-$VERSION.zip" >> "$GITHUB_OUTPUT"

      - name: Fail if tag already exists
        if: ${{ steps.release_gate.outputs.continue == 'true' && (github.event_name == 'schedule' || github.event.inputs.dry_run != 'true') }}
        run: |
          if git rev-parse "${{ steps.version.outputs.tag }}" >/dev/null 2>&1; then
            echo "Tag ${{ steps.version.outputs.tag }} already exists; refusing to overwrite a release." >&2
            exit 1
          fi

      - name: Commit generated release files
        if: ${{ steps.release_gate.outputs.continue == 'true' && (github.event_name == 'schedule' || github.event.inputs.dry_run != 'true') }}
        run: |
          git add package.json QuickWoWTalents/QuickWoWTalents.toc QuickWoWTalents/QuickWoWTalentsData.lua
          git commit -m "Daily addon data release ${{ steps.version.outputs.tag }}"
          git tag "${{ steps.version.outputs.tag }}"

      - name: Push release commit and tag
        if: ${{ steps.release_gate.outputs.continue == 'true' && (github.event_name == 'schedule' || github.event.inputs.dry_run != 'true') }}
        run: git push origin HEAD:main "${{ steps.version.outputs.tag }}"

      - name: Create GitHub release
        if: ${{ steps.release_gate.outputs.continue == 'true' && (github.event_name == 'schedule' || github.event.inputs.dry_run != 'true') }}
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          printf '%s\n\n%s\n' \
            'Automated daily Quick WoW Talents addon data refresh.' \
            'Bundled data is downloaded from the product-side quickwowtalents.com addon data artifact, then packaged as a static offline addon zip.' \
            > /tmp/release-notes.md

          gh release create "${{ steps.version.outputs.tag }}" "${{ steps.version.outputs.zip }}" \
            --title "QuickWoWTalents ${{ steps.version.outputs.tag }}" \
            --notes-file /tmp/release-notes.md
